# Site settings
title: "徐云成-生态水动力学课题组 Eco-Hydrodynamics Group"
title1: "徐云成-生态水动力学课题组<br>Eco-Hydrodynamics Group"
email: ycxu@cau.edu.cn
description: "生态水动力学课题组（Eco-Hydro Group）由中国农业大学徐云成副教授负责，长期聚焦农业水利工程与智慧农业交叉领域，围绕节水灌溉装备机理与智能化、农田智慧感知与精准作业、农业水动力学、农业水资源系统优化四大方向，形成\"机理解析→装备研发→系统集成→工程应用\"的完整研究体系。The Eco-Hydrodynamics Research Group (Eco-Hydro Group), led by Prof. Yuncheng Xu at China Agricultural University, works at the intersection of agricultural water conservancy and smart agriculture, advancing four integrated directions: water-saving irrigation intelligence, smart farmland sensing, agricultural hydrodynamics, and water resources system optimization."
